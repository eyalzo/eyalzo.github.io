<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סדר היום הפרלמנטרי - תפריט ראשי</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset & Variables */
        :root {
            --bg-base: #f8fafc;
            --text-main: #0f172a;
            --header-bg: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); line-height: 1.6; padding: 24px; font-size: 16px; }

        /* Utility Classes */
        .max-w-7xl { max-width: 80rem; margin: 0 auto; }
        .grid { display: grid; gap: 1.5rem; }
        .grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
        @media (min-width: 768px) {
            .md\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .col-span-2 { grid-column: span 2 / span 2; }
        }
        @media (min-width: 1024px) {
            .lg\:grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
            .lg\:col-span-3 { grid-column: span 3 / span 3; }
        }

        .flex { display: flex; } .flex-col { flex-direction: column; }
        @media (min-width: 768px) { .md\:flex-row { flex-direction: row; } }
        .items-center { align-items: center; } .items-start { align-items: flex-start; }
        .justify-between { justify-content: space-between; } .justify-center { justify-content: center; }
        .flex-grow { flex-grow: 1; }
        .gap-2 { gap: 0.5rem; } .gap-4 { gap: 1rem; } .gap-6 { gap: 1.5rem; }

        .p-2 { padding: 0.5rem; } .p-4 { padding: 1rem; } .p-8 { padding: 2rem; }
        .mb-1 { margin-bottom: 0.25rem; } .mb-2 { margin-bottom: 0.5rem; } .mb-3 { margin-bottom: 0.75rem; } .mb-4 { margin-bottom: 1rem; } .mb-6 { margin-bottom: 1.5rem; } .mb-8 { margin-bottom: 2rem; }
        .mt-1 { margin-top: 0.25rem; } .mt-2 { margin-top: 0.5rem; } .mt-8 { margin-top: 2rem; } .mt-auto { margin-top: auto; }

        .border-b { border-bottom: 1px solid #e2e8f0; } .border-t { border-top: 1px solid #e2e8f0; } .border { border: 1px solid #e2e8f0; }
        .rounded-lg { border-radius: 0.5rem; } .rounded-xl { border-radius: 0.75rem; }
        .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); }
        .text-center { text-align: center; } .whitespace-nowrap { white-space: nowrap; }

        /* Typography */
        .text-sm { font-size: 0.95rem; } .text-base { font-size: 1.15rem; }
        .text-lg { font-size: 1.25rem; font-weight: 700; } .text-xl { font-size: 1.5rem; font-weight: 700; } .text-2xl { font-size: 1.8rem; font-weight: 700; } .text-3xl { font-size: 2.5rem; font-weight: 700; }
        .font-bold { font-weight: 700; } .font-semibold { font-weight: 600; } .font-mono { font-family: monospace; }
        .text-\[0\.7rem\] { font-size: 0.7rem; }

        .bg-white { background-color: #ffffff; } .bg-gray-50 { background-color: #f9fafb; } .bg-transparent { background-color: transparent; }
        .text-gray-200 { color: #e2e8f0; } .text-gray-400 { color: #94a3b8; } .text-gray-500 { color: #64748b; } .text-gray-600 { color: #475569; } .text-gray-700 { color: #334155; } .text-gray-800 { color: #1e293b; } .text-gray-900 { color: #0f172a; }
        .text-blue-400 { color: #60a5fa; } .text-blue-600 { color: #2563eb; } .text-blue-800 { color: #1e40af; }

        /* Filter Styles */
        select:focus { outline: none; border-color: #3b82f6; }
        .cursor-pointer { cursor: pointer; }

        /* Landing Cards Specific Styles */
        .landing-card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-top: 4px solid #3b82f6;
            border-radius: 0.75rem;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }
        .landing-card:hover {
            background-color: #eff6ff;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            transform: translateY(-4px);
            border-color: #93c5fd;
            border-top-color: #2563eb;
        }

        /* Favorites Button */
        .fav-btn {
            position: absolute;
            top: 1.25rem;
            left: 1.25rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
        }
        .fav-btn:hover {
            transform: scale(1.2);
        }

        /* Layout Specific */
        header { background-color: var(--header-bg); color: white; padding: 1.75rem; border-radius: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .badge-mono { font-family: monospace; background: rgba(255,255,255,0.1); padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.2); font-size: 1.1rem; display: flex; gap: 1rem; align-items: center; }

        #error-message { display: none; background: #fee2e2; border: 1px solid #f87171; color: #991b1b; padding: 20px; border-radius: 8px; margin: 20px auto; max-width: 600px; text-align: center; }
    </style>
</head>
<body>
    <div id="landing-page" class="max-w-7xl mt-8">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl mb-1">סדר היום הפרלמנטרי</h1>
                <p class="text-gray-200 text-base mt-1">יש לבחור נושא מעקב מהרשימה מטה:</p>
                <div class="text-[0.7rem] text-gray-400 mt-2 max-w-lg leading-tight" style="opacity: 0.8;">
                    <strong>הבהרה:</strong> מערכת זו מבוססת מודל שפה ונוצרה להדגמה בלבד. המידע אינו רשמי או עובדתי.
                </div>
            </div>
            <div class="badge-mono mr-auto">
                <span class="font-semibold">מערכת ליבה גרסה 1.9.2 (סינון אישים נקי)</span>
                <span style="opacity: 0.5; margin: 0 0.5rem;">|</span>
                <span class="font-bold text-blue-400">Gilat AI</span>
            </div>
        </header>

        <div id="error-message"></div>

        <!-- Filter Bar -->
        <div class="mb-8 flex flex-col md:flex-row gap-4 bg-white p-4 rounded-xl shadow-sm border items-start md:items-center">
            <span class="font-bold text-gray-700 whitespace-nowrap text-lg">🔍 סינון נושאים:</span>

            <select id="committeeFilter" class="p-2 border rounded-lg bg-gray-50 text-gray-800 flex-grow font-semibold text-lg" style="max-width: 320px;">
                <option value="all">כל הוועדות</option>
            </select>

            <select id="politicianFilter" class="p-2 border rounded-lg bg-gray-50 text-gray-800 flex-grow font-semibold text-lg" style="max-width: 320px;">
                <option value="all">כל מקבלי ההחלטות</option>
            </select>

            <button onclick="resetFilters()" class="text-lg text-blue-600 font-bold cursor-pointer border-none bg-transparent mr-auto" style="text-decoration: underline;">ניקוי ✖</button>
        </div>

        <div id="landing-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <script>
        // Global storage for all loaded dashboards and their JSON data
        window.allDashboards = [];

        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                let date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "")  + expires + "; path=/";
        }

        function getCookie(name) {
            let nameEQ = name + "=";
            let ca = document.cookie.split(';');
            for(let i=0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0)==' ') c = c.substring(1,c.length);
                if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
            }
            return null;
        }

        function getCorrectedDate(dateStr) {
            if (!dateStr || dateStr === "לא ידוע") return dateStr;
            const parts = dateStr.split('/');
            if (parts.length !== 3) return dateStr;

            const updateDate = new Date(parts[2], parts[1] - 1, parts[0]);
            const today = new Date();

            today.setHours(0,0,0,0);
            updateDate.setHours(0,0,0,0);

            if (updateDate > today) {
                const dd = String(today.getDate()).padStart(2, '0');
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const yyyy = today.getFullYear();
                return `${dd}/${mm}/${yyyy}`;
            }
            return dateStr;
        }

        function isRecentlyUpdated(dateStr) {
            if (!dateStr || dateStr === "לא ידוע") return false;
            const parts = dateStr.split('/');
            if (parts.length !== 3) return false;

            const updateDate = new Date(parts[2], parts[1] - 1, parts[0]);
            const today = new Date();

            return updateDate.getDate() === today.getDate() &&
                   updateDate.getMonth() === today.getMonth() &&
                   updateDate.getFullYear() === today.getFullYear();
        }

        window.toggleFav = function(event, id, btnEl) {
            event.stopPropagation();
            let favs = [];
            const cookieStr = getCookie('parl_favs');
            if (cookieStr) favs = JSON.parse(cookieStr);

            if (favs.includes(id)) {
                favs = favs.filter(f => f !== id);
                btnEl.innerText = '🤍';
                btnEl.setAttribute('title', 'הוספה למועדפים');
            } else {
                favs.push(id);
                btnEl.innerText = '❤️';
                btnEl.setAttribute('title', 'הסרה ממועדפים');
            }
            setCookie('parl_favs', JSON.stringify(favs), 365);
        };

        // Name extraction logic for politicians
        function extractNames(rawName) {
            // Remove parentheses and their contents (e.g. "(קואליציה)")
            let clean = rawName.replace(/\(.*?\)/g, '');
            // Split by slash for multiple names
            let parts = clean.split('/');
            let names = [];

            const titlesToRemove = /^(ח"כ|ח״כ|השר|השרה)\s+/;
            // General roles that are not specific names
            const roleRegex = /^(שר ה|יו"ר|יו״ר|מנכ"ל|מנכ״ל|ראשי|חברי|שדולת|פורום)/;

            parts.forEach(part => {
                let p = part.trim();

                // Skip if it's a general role
                if (roleRegex.test(p)) return;

                // Remove prefix titles if they exist
                p = p.replace(titlesToRemove, '').trim();

                // Keep only valid substantial names
                if (p.length > 2) {
                    names.push(p);
                }
            });
            return names;
        }

        window.onload = async () => {
            try {
                const response = await fetch('manifest.json');
                if (!response.ok) throw new Error("Failed fetching manifest");
                const manifest = await response.json();

                // Fetch all JSON files to have the full data for filtering
                window.allDashboards = await Promise.all(manifest.dashboards.map(async (d) => {
                    try {
                        const fileRes = await fetch(d.file);
                        const fileData = await fileRes.json();
                        const correctedDate = getCorrectedDate(fileData.meta.lastUpdate);
                        return { ...d, fileData: fileData, lastUpdate: correctedDate };
                    } catch (e) {
                        return { ...d, fileData: null, lastUpdate: "לא ידוע" };
                    }
                }));

                buildFilterOptions();
                renderLanding(window.allDashboards);
            } catch (e) {
                console.error("Error loading manifest:", e);
                document.getElementById('error-message').style.display = 'block';
                document.getElementById('error-message').innerHTML = `
                    <strong>שגיאת אבטחה בטעינת הקבצים (CORS)</strong><br><br>
                    נראה שהקובץ נפתח ישירות מהתיקייה המקומית. דפדפנים חוסמים טעינת קובצי JSON באופן מקומי מטעמי אבטחה.<br>
                    כדי להפעיל את המערכת, יש להריץ אותה דרך שרת מקומי.
                `;
            }
        };

        function buildFilterOptions() {
            const committeeCounts = {};
            const politicianCounts = {};

            // Extract and count unique names per dashboard (topic)
            window.allDashboards.forEach(d => {
                if (d.fileData && d.fileData.appConfiguration && d.fileData.appConfiguration.ecosystem) {
                    const eco = d.fileData.appConfiguration.ecosystem;

                    // Use a Set to ensure we count each entity only once per dashboard
                    const dCommittees = new Set();
                    const dPoliticians = new Set();

                    if (eco.committees) eco.committees.forEach(c => dCommittees.add(c.name));

                    if (eco.politicians) {
                        eco.politicians.forEach(p => {
                            const extracted = extractNames(p.name);
                            extracted.forEach(n => dPoliticians.add(n));
                        });
                    }

                    dCommittees.forEach(c => {
                        committeeCounts[c] = (committeeCounts[c] || 0) + 1;
                    });

                    dPoliticians.forEach(p => {
                        politicianCounts[p] = (politicianCounts[p] || 0) + 1;
                    });
                }
            });

            const commSelect = document.getElementById('committeeFilter');
            Object.keys(committeeCounts).sort().forEach(c => {
                commSelect.innerHTML += `<option value="${c}">${c} (${committeeCounts[c]})</option>`;
            });

            const polSelect = document.getElementById('politicianFilter');
            Object.keys(politicianCounts).sort().forEach(p => {
                polSelect.innerHTML += `<option value="${p}">${p} (${politicianCounts[p]})</option>`;
            });

            // Event listeners to isolate filters from each other
            commSelect.addEventListener('change', () => {
                document.getElementById('politicianFilter').value = 'all';
                applyFilters();
            });

            polSelect.addEventListener('change', () => {
                document.getElementById('committeeFilter').value = 'all';
                applyFilters();
            });
        }

        function applyFilters() {
            const commVal = document.getElementById('committeeFilter').value;
            const polVal = document.getElementById('politicianFilter').value;

            const filteredDashboards = window.allDashboards.filter(d => {
                if (!d.fileData || !d.fileData.appConfiguration || !d.fileData.appConfiguration.ecosystem) return false;
                const eco = d.fileData.appConfiguration.ecosystem;

                let commMatch = false;
                if (commVal === 'all') {
                    commMatch = true;
                } else if (eco.committees && eco.committees.some(c => c.name === commVal)) {
                    commMatch = true;
                }

                let polMatch = false;
                if (polVal === 'all') {
                    polMatch = true;
                } else if (eco.politicians) {
                    eco.politicians.forEach(p => {
                        const extracted = extractNames(p.name);
                        if (extracted.includes(polVal)) {
                            polMatch = true;
                        }
                    });
                }

                return commMatch && polMatch;
            });

            renderLanding(filteredDashboards);
        }

        window.resetFilters = function() {
            document.getElementById('committeeFilter').value = 'all';
            document.getElementById('politicianFilter').value = 'all';
            renderLanding(window.allDashboards);
        }

        function renderLanding(dashboards) {
            const container = document.getElementById('landing-grid');

            if (!dashboards || dashboards.length === 0) {
                container.innerHTML = `
                    <div class="col-span-1 md:col-span-2 lg:col-span-3 text-center p-8 bg-gray-50 border rounded-xl text-gray-500 text-lg font-semibold">
                        לא נמצאו נושאי מעקב התואמים לסינון המבוקש.
                    </div>`;
                return;
            }

            let favs = [];
            const cookieStr = getCookie('parl_favs');
            if (cookieStr) favs = JSON.parse(cookieStr);

            container.innerHTML = dashboards.map(d => {
                const isFav = favs.includes(d.id);
                const isRecent = isRecentlyUpdated(d.lastUpdate);
                const flameIcon = isRecent ? '<span title="עודכן היום!" class="text-xl">🔥</span>' : '';

                return `
                <div class="landing-card" onclick="window.location.href='dashboard.html?file=${d.file}'">
                    <button class="fav-btn" onclick="toggleFav(event, '${d.id}', this)" title="${isFav ? 'הסרה ממועדפים' : 'הוספה למועדפים'}">
                        ${isFav ? '❤️' : '🤍'}
                    </button>
                    <h3 class="text-2xl font-bold mb-3 text-gray-900 border-b pb-2" style="padding-left: 2.5rem;">${d.title}</h3>
                    <p class="text-gray-600 text-lg mb-4 flex-grow leading-relaxed">${d.description}</p>
                    <div class="mt-auto pt-3 border-t text-sm font-semibold text-gray-500 flex items-center gap-2">
                        <span>🕒 עודכן:</span>
                        <span class="text-gray-800 flex items-center gap-1">${d.lastUpdate} ${flameIcon}</span>
                    </div>
                </div>
            `}).join('');
        }
    </script>
</body>
</html>
